<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIEI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%,#b6a1ff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 154, 162, 0.3);
            text-align: center;
            backdrop-filter: blur(5px);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .heart {
            font-size: 50px;
            color: #ff4d6d;
            animation: heartbeat 1.2s infinite;
            margin-bottom: 20px;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.15); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yesBtn:hover {
            background-color: #ff758f;
            transform: scale(1.05);
        }

        #noBtn {
            background-color: #f0f0f0;
            color: #666;
            position: absolute;
            right: 50px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="heart">💖</div>
        <h1>กดดู</h1>
        <p>มันกดออกไม่ได้ <br><b>ห้ามกดออกนะ</b></p>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="goToLovePage()">ENTER</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">NO</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const container = document.getElementById('mainContainer');
            
            // คำนวณพื้นที่สูงสุดที่ปุ่มจะขยับได้ภายในกล่อง
            const maxWidth = container.clientWidth - noBtn.clientWidth - 40;
            const maxHeight = container.clientHeight - noBtn.clientHeight - 80;
            
            // สุ่มตำแหน่งใหม่
            const randomX = Math.floor(Math.random() * maxWidth) + 20;
            const randomY = Math.floor(Math.random() * maxHeight) + 20;
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // ฟังก์ชันสำหรับกดแล้วเด้งไปหน้า love animation.html
        function goToLovePage() {
            window.location.href = "love animation.html";
        }
    </script>
</body>
</html>
